name: CI of mc_mujoco

on:
  repository_dispatch:
    types:
    - run-ci
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  schedule:
    # Run on Sunday, Tuesday and Thursday nights
    - cron: '0 23 * * 0,1,4'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04]
        compiler: [gcc]
        build-type: [RelWithDebInfo]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive
    - name: Get MuJoCo Version
      id: mujoco_version
      shell: bash
      run: |
        set -x
        set -e
        MUJOCO_VERSION=$(cat $GITHUB_WORKSPACE/MUJOCO_VERSION | tr -d '[:space:]')
        echo "MUJOCO_VERSION=$MUJOCO_VERSION" >> $GITHUB_OUTPUT
    - name: Install dependencies
      uses: jrl-umi3218/github-actions/install-dependencies@master
      with:
        compiler: ${{ matrix.compiler }}
        build-type: ${{ matrix.build-type }}
        ubuntu: |
          apt: libmc-rtc-dev libxi-dev libxcursor-dev libxkbcommon-dev libxinerama-dev libxrandr-dev libglew-dev libboost-program-options-dev libglfw3-dev libcereal-dev libspdlog-dev
          apt-mirrors:
            mc-rtc:
              cloudsmith: mc-rtc/head
        macos: |
          brew-taps: mc-rtc/mc-rtc
          brew: mc_rtc
        windows: |
          vcpkg:
            repo: microsoft/vcpkg
            owner: mc-rtc
            token: "${{ secrets.GITHUB_TOKEN }}"
            registries:
            - repo: mc-rtc/vcpkg-registry
              packages: [ spacevecalg, rbdyn, eigen-qld, sch-core, tasks, mc-rbdyn-urdf, mc-rtc-data, eigen-quadprog, state-observation, hpp-spline, mc-rtc ]
        github: |
            - path: google-deepmind/mujoco
              ref: ${{ steps.mujoco_version.outputs.MUJOCO_VERSION }}
              options: -DMUJOCO_BUILD_TESTS:BOOL=OFF -DMUJOCO_BUILD_EXAMPLES:BOOL=OFF -DMUJOCO_BUILD_SIMULATE=OFF
    - name: Build and test
      uses: jrl-umi3218/github-actions/build-cmake-project@master
      with:
        compiler: ${{ matrix.compiler }}
        build-type: ${{ matrix.build-type }}
    - name: Check usage
      shell: bash
      run: |
        set -x
        cd .github/workflows/test-standalone
        mkdir build && cd build
        cmake ../ -DCMAKE_BUILD_TYPE=${{ matrix.build-type }}
        cmake --build . --config ${{ matrix.build-type }}
        ctest -V -C ${{ matrix.build-type }}
